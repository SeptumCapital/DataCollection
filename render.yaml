services:
  - type: web
    name: senquant-data-browser
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app/server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SENQUANT_DATA_ROOT
        value: /var/data/senquant/data
      - key: DATA_COLLECTION_ROOT
        value: /var/data/senquant/data
      - key: SENQUANT_ENABLE_DAILY_REFRESH
        value: "true"
      - key: SENQUANT_REFRESH_TIMEZONE
        value: America/New_York
      - key: SENQUANT_REFRESH_HOUR
        value: "17"
      - key: SENQUANT_REFRESH_MINUTE
        value: "30"
      - key: SENQUANT_OLLAMA_HOSTPORT
        fromService:
          type: pserv
          name: senquant-ollama
          property: hostport
      - key: SENQUANT_OLLAMA_MODEL
        value: llama3.2:1b
      - key: SENQUANT_OLLAMA_TIMEOUT_SECONDS
        value: "45"
      - key: SENQUANT_OLLAMA_MAX_TOKENS
        value: "160"
      - key: SENQUANT_OLLAMA_KEEP_ALIVE
        value: 30m
      - key: SENQUANT_EXTERNAL_LLM_TIMEOUT_SECONDS
        value: "90"
      - key: SENQUANT_EXTERNAL_LLM_MAX_TOKENS
        value: "260"
    disk:
      name: senquant-data
      mountPath: /var/data/senquant
      sizeGB: 10
  - type: pserv
    name: senquant-ollama
    runtime: docker
    plan: pro
    dockerfilePath: ./deploy/ollama/Dockerfile
    dockerContext: .
    envVars:
      - key: OLLAMA_MODEL
        value: llama3.2:1b
      - key: OLLAMA_HOST
        value: 0.0.0.0:11434
      - key: OLLAMA_MODELS
        value: /var/data/ollama/models
      - key: OLLAMA_WARMUP_TIMEOUT_SECONDS
        value: "180"
    disk:
      name: senquant-ollama-models
      mountPath: /var/data/ollama
      sizeGB: 20
